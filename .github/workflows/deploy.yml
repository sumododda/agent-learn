name: Deploy to Cloud Run

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUD_SQL: ${{ vars.GCP_CLOUD_SQL_INSTANCE }}
      SECRETS: JWT_SECRET_KEY=jwt-secret-key:latest,ENCRYPTION_PEPPER=encryption-pepper:latest,TURNSTILE_SECRET_KEY=turnstile-secret-key:latest,RESEND_API_KEY=resend-api-key:latest,RESEND_FROM_EMAIL=resend-from-email:latest,POSTGRES_PASSWORD=db-password:latest
      BACKEND_IMG: ${{ vars.GCP_AR_PROXY }}/sumododda/agent-learn/backend:${{ github.sha }}
      FRONTEND_IMG: ${{ vars.GCP_AR_PROXY }}/sumododda/agent-learn/frontend:${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # â”€â”€ Build & push images to ghcr.io â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./deploy/Dockerfile.backend
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:${{ github.sha }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./deploy/Dockerfile.frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}

      # â”€â”€ Authenticate to GCP via Workload Identity â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # â”€â”€ Deploy Cloud Run services â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Deploy backend-api
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: agentlearn-backend
          image: ${{ env.BACKEND_IMG }}
          region: ${{ vars.GCP_REGION }}
          flags: >-
            --add-cloudsql-instances=${{ vars.GCP_CLOUD_SQL_INSTANCE }}
            --min-instances=1
            --max-instances=3
            --memory=512Mi
            --cpu=1
            --port=8000
            --allow-unauthenticated
            --set-secrets=${{ env.SECRETS }}
          env_vars: |
            CLOUD_SQL_INSTANCE=${{ vars.GCP_CLOUD_SQL_INSTANCE }}
            CORS_ORIGINS=${{ vars.CORS_ORIGINS }}
            DOCS_ENABLED=false

      - name: Deploy backend-worker
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: agentlearn-worker
          image: ${{ env.BACKEND_IMG }}
          region: ${{ vars.GCP_REGION }}
          flags: >-
            --add-cloudsql-instances=${{ vars.GCP_CLOUD_SQL_INSTANCE }}
            --min-instances=1
            --max-instances=1
            --memory=512Mi
            --cpu=1
            --no-cpu-throttling
            --port=8080
            --command=python,-m,app.worker
            --allow-unauthenticated
            --set-secrets=${{ env.SECRETS }}
          env_vars: |
            CLOUD_SQL_INSTANCE=${{ vars.GCP_CLOUD_SQL_INSTANCE }}
            CORS_ORIGINS=${{ vars.CORS_ORIGINS }}

      - name: Deploy frontend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: agentlearn-frontend
          image: ${{ env.FRONTEND_IMG }}
          region: ${{ vars.GCP_REGION }}
          flags: >-
            --min-instances=1
            --max-instances=3
            --memory=256Mi
            --cpu=1
            --port=3000
            --allow-unauthenticated
          env_vars: |
            INTERNAL_API_URL=${{ vars.INTERNAL_API_URL }}

      # â”€â”€ Run database migrations â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Run Alembic migrations
        run: |
          if gcloud run jobs describe agentlearn-migrate --region=${{ vars.GCP_REGION }} --project=${{ vars.GCP_PROJECT_ID }} >/dev/null 2>&1; then
            gcloud run jobs update agentlearn-migrate \
              --image=${{ env.BACKEND_IMG }} \
              --region=${{ vars.GCP_REGION }} \
              --set-cloudsql-instances=${{ env.CLOUD_SQL }} \
              --set-secrets=${{ env.SECRETS }} \
              --set-env-vars="CLOUD_SQL_INSTANCE=${{ env.CLOUD_SQL }}" \
              --command="/entrypoint.sh" \
              --args="alembic,upgrade,head" \
              --max-retries=2 \
              --project=${{ vars.GCP_PROJECT_ID }}
          else
            gcloud run jobs create agentlearn-migrate \
              --image=${{ env.BACKEND_IMG }} \
              --region=${{ vars.GCP_REGION }} \
              --set-cloudsql-instances=${{ env.CLOUD_SQL }} \
              --set-secrets=${{ env.SECRETS }} \
              --set-env-vars="CLOUD_SQL_INSTANCE=${{ env.CLOUD_SQL }}" \
              --command="/entrypoint.sh" \
              --args="alembic,upgrade,head" \
              --max-retries=2 \
              --project=${{ vars.GCP_PROJECT_ID }}
          fi

          gcloud run jobs execute agentlearn-migrate \
            --region=${{ vars.GCP_REGION }} \
            --wait \
            --project=${{ vars.GCP_PROJECT_ID }}
