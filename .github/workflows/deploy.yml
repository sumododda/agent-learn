name: CI/CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  # ── Detect which folders changed ────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'deploy/Dockerfile.backend'
            frontend:
              - 'frontend/**'
              - 'deploy/Dockerfile.frontend'
            infra:
              - 'deploy/k8s/**'
              - '.github/workflows/deploy.yml'

  # ── Build Backend ───────────────────────────────────────────────
  build-backend:
    name: Build Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_BASE }}/backend
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./deploy/Dockerfile.backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build Frontend ──────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/frontend
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./deploy/Dockerfile.frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to GKE ──────────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    needs: [changes, build-backend, build-frontend]
    if: >-
      always() && !failure() && !cancelled() &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ vars.GKE_CLUSTER_NAME }}
          location: ${{ vars.GCP_REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Select deploy images
        env:
          FULL_SHA: ${{ github.sha }}
        run: |
          SHORT=${FULL_SHA:0:7}

          if [[ "${{ needs.changes.outputs.backend }}" == "true" ]]; then
            echo "BACKEND_IMAGE=${{ env.IMAGE_BASE }}/backend:${SHORT}" >> "$GITHUB_ENV"
          else
            echo "BACKEND_IMAGE=${{ env.IMAGE_BASE }}/backend:latest" >> "$GITHUB_ENV"
          fi

          if [[ "${{ needs.changes.outputs.frontend }}" == "true" ]]; then
            echo "FRONTEND_IMAGE=${{ env.IMAGE_BASE }}/frontend:${SHORT}" >> "$GITHUB_ENV"
          else
            echo "FRONTEND_IMAGE=${{ env.IMAGE_BASE }}/frontend:latest" >> "$GITHUB_ENV"
          fi

      - name: Render Kubernetes manifests
        run: |
          chmod +x deploy/k8s/render-manifests.sh
          deploy/k8s/render-manifests.sh rendered-k8s

      - name: Apply cluster base manifests
        run: |
          kubectl apply -f rendered-k8s/namespace.yaml
          kubectl apply -f rendered-k8s/postgres.yaml
          kubectl rollout status statefulset/postgres -n ${{ vars.GKE_NAMESPACE }} --timeout=300s
          kubectl apply -f rendered-k8s/backend-config.yaml
          kubectl apply -f rendered-k8s/frontend-config.yaml
          kubectl apply -f rendered-k8s/managed-cert.yaml
          kubectl apply -f rendered-k8s/network-policies.yaml

      - name: Run migrations from rendered manifest
        run: |
          kubectl delete job alembic-migrate -n ${{ vars.GKE_NAMESPACE }} --ignore-not-found
          kubectl wait --for=delete job/alembic-migrate -n ${{ vars.GKE_NAMESPACE }} --timeout=60s || true
          kubectl apply -f rendered-k8s/migration-job.yaml
          kubectl wait --for=condition=complete job/alembic-migrate -n ${{ vars.GKE_NAMESPACE }} --timeout=300s

      - name: Apply app manifests
        run: |
          kubectl apply -f rendered-k8s/backend-api.yaml
          kubectl apply -f rendered-k8s/backend-worker.yaml
          kubectl apply -f rendered-k8s/frontend.yaml
          kubectl apply -f rendered-k8s/ingress.yaml

      - name: Wait for workloads
        run: |
          kubectl rollout status deployment/backend-api -n ${{ vars.GKE_NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/backend-worker -n ${{ vars.GKE_NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/frontend -n ${{ vars.GKE_NAMESPACE }} --timeout=300s

      # Verify
      - name: Health check
        run: |
          kubectl get pods -n ${{ vars.GKE_NAMESPACE }}
          echo "---"
          kubectl exec deployment/frontend -n ${{ vars.GKE_NAMESPACE }} -- \
            wget -qO- http://backend-api:8000/api/health || true
