name: CI/CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  # ── Detect which folders changed ────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'deploy/Dockerfile.backend'
            frontend:
              - 'frontend/**'
              - 'deploy/Dockerfile.frontend'
            infra:
              - 'deploy/k8s/ingress.yaml'
              - 'deploy/k8s/backend-config.yaml'
              - 'deploy/k8s/frontend-config.yaml'
              - 'deploy/k8s/managed-cert.yaml'
              - '.github/workflows/deploy.yml'

  # ── Build Backend ───────────────────────────────────────────────
  build-backend:
    name: Build Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/backend
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./deploy/Dockerfile.backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build Frontend ──────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/frontend
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./deploy/Dockerfile.frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to GKE ──────────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    needs: [changes, build-backend, build-frontend]
    if: >-
      always() && !failure() && !cancelled() &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ vars.GKE_CLUSTER_NAME }}
          location: ${{ vars.GCP_REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Apply ingress and LB config
        if: needs.changes.outputs.infra == 'true'
        run: |
          kubectl apply -f deploy/k8s/backend-config.yaml
          kubectl apply -f deploy/k8s/frontend-config.yaml
          kubectl apply -f deploy/k8s/managed-cert.yaml
          kubectl apply -f deploy/k8s/ingress.yaml

      # Update backend if changed
      - name: Deploy backend
        if: needs.changes.outputs.backend == 'true'
        env:
          FULL_SHA: ${{ github.sha }}
        run: |
          SHORT=${FULL_SHA:0:7}
          IMAGE="${{ env.IMAGE_BASE }}/backend:${SHORT}"
          kubectl set image deployment/backend-api backend-api=${IMAGE} -n ${{ vars.GKE_NAMESPACE }}
          kubectl set image deployment/backend-worker backend-worker=${IMAGE} -n ${{ vars.GKE_NAMESPACE }}
          kubectl rollout status deployment/backend-api -n ${{ vars.GKE_NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/backend-worker -n ${{ vars.GKE_NAMESPACE }} --timeout=300s

      # Run migrations if backend changed
      - name: Run migrations
        if: needs.changes.outputs.backend == 'true'
        env:
          FULL_SHA: ${{ github.sha }}
        run: |
          SHORT=${FULL_SHA:0:7}
          IMAGE="${{ env.IMAGE_BASE }}/backend:${SHORT}"
          NAMESPACE="${{ vars.GKE_NAMESPACE }}"

          # Delete previous job if exists
          kubectl delete job alembic-migrate -n ${NAMESPACE} --ignore-not-found

          # Create and run migration job with the new image
          kubectl create job alembic-migrate \
            --from=cronjob/placeholder --dry-run=client -o yaml 2>/dev/null || true

          # Apply migration job with updated image
          cat deploy/k8s/migration-job.yaml | \
            sed "s|image:.*|image: ${IMAGE}|" | \
            kubectl apply -f -

          kubectl wait --for=condition=complete job/alembic-migrate \
            -n ${NAMESPACE} --timeout=300s

      # Update frontend if changed
      - name: Deploy frontend
        if: needs.changes.outputs.frontend == 'true'
        env:
          FULL_SHA: ${{ github.sha }}
        run: |
          SHORT=${FULL_SHA:0:7}
          IMAGE="${{ env.IMAGE_BASE }}/frontend:${SHORT}"
          kubectl set image deployment/frontend frontend=${IMAGE} -n ${{ vars.GKE_NAMESPACE }}
          kubectl rollout status deployment/frontend -n ${{ vars.GKE_NAMESPACE }} --timeout=300s

      # Verify
      - name: Health check
        run: |
          kubectl get pods -n ${{ vars.GKE_NAMESPACE }}
          echo "---"
          kubectl exec deployment/frontend -n ${{ vars.GKE_NAMESPACE }} -- \
            wget -qO- http://backend-api:8000/api/health || true
