apiVersion: batch/v1
kind: Job
metadata:
  name: alembic-migrate
  namespace: agent-learn
  labels:
    app: alembic-migrate
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: alembic-migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: us-central1-docker.pkg.dev/agent-learn-491717/agent-learn/backend:v2
          imagePullPolicy: Always
          args: ["alembic", "upgrade", "head"]
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: postgres-password
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: jwt-secret-key
            - name: ENCRYPTION_PEPPER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: encryption-pepper
            - name: TURNSTILE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: turnstile-secret-key
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: resend-api-key
            - name: RESEND_FROM_EMAIL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: resend-from-email
