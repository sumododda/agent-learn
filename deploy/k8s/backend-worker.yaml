apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-worker
  namespace: agent-learn
  labels:
    app: backend-worker
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: backend-worker
  template:
    metadata:
      labels:
        app: backend-worker
    spec:
      containers:
        - name: backend-worker
          image: ghcr.io/sumododda/agent-learn/backend:latest
          imagePullPolicy: Always
          args: ["python", "-m", "app.worker"]
          resources:
            requests:
              memory: "2Gi"
              cpu: "250m"
              ephemeral-storage: "1Gi"
            limits:
              memory: "3Gi"
              cpu: "500m"
              ephemeral-storage: "1Gi"
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: postgres-password
            - name: CORS_ORIGINS
              value: "https://learn.blekcipher.com"
            - name: DOCS_ENABLED
              value: "false"
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: jwt-secret-key
            - name: ENCRYPTION_PEPPER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: encryption-pepper
            - name: TURNSTILE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: turnstile-secret-key
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: resend-api-key
            - name: RESEND_FROM_EMAIL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: resend-from-email
            - name: OPENALEX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: openalex-api-key
            - name: SERPER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: serper-api-key
            - name: UNPAYWALL_EMAIL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: unpaywall-email
