apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: agent-learn
  labels:
    app: backend-api
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      containers:
        - name: backend-api
          image: ghcr.io/sumododda/agent-learn/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "1Gi"
              cpu: "250m"
              ephemeral-storage: "1Gi"
            limits:
              memory: "2Gi"
              cpu: "500m"
              ephemeral-storage: "1Gi"
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: postgres-password
            - name: CORS_ORIGINS
              value: "https://learn.blekcipher.com"
            - name: DOCS_ENABLED
              value: "false"
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: jwt-secret-key
            - name: ENCRYPTION_PEPPER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: encryption-pepper
            - name: TURNSTILE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: turnstile-secret-key
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: resend-api-key
            - name: RESEND_FROM_EMAIL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: resend-from-email
            - name: OPENALEX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: openalex-api-key
            - name: SERPER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: serper-api-key
            - name: UNPAYWALL_EMAIL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: unpaywall-email
---
apiVersion: v1
kind: Service
metadata:
  name: backend-api
  namespace: agent-learn
  labels:
    app: backend-api
  annotations:
    cloud.google.com/backend-config: '{"default": "backend-api-config"}'
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    app: backend-api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-api
  namespace: agent-learn
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-api
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
