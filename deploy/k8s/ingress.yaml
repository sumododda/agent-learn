apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-learn-ingress
  namespace: agent-learn
  annotations:
    kubernetes.io/ingress.class: "gce"
spec:
  rules:
    - host: learn.blekcipher.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
