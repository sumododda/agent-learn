apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-learn-ingress
  namespace: agent-learn
  annotations:
    kubernetes.io/ingress.class: "gce"
    networking.gke.io/managed-certificates: "agent-learn-cert"
    kubernetes.io/ingress.allow-http: "false"
spec:
  rules:
    - host: learn.blekcipher.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
